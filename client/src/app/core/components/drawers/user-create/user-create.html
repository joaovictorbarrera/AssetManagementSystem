<form
    class="flex flex-col w-full h-full justify-center items-center p-10 relative"
    #userForm="ngForm"
    (ngSubmit)="submit(userForm)"
>
    <div class="flex flex-col gap-8 w-full h-full">
        <h2 class="text-3xl font-bold inline">Create New User</h2>
        <div class="flex flex-col gap-5">
            <div class="flex flex-col gap-2">
                <p class="text-text-secondary">First Name</p>
                <input
                    [(ngModel)]="firstName"
                    class="drawer-input"
                    name="firstName"
                    type="text"
                    placeholder="John"
                    required
                />
            </div>

            <div class="flex flex-col gap-2">
                <p class="text-text-secondary">Last Name</p>
                <input
                    [(ngModel)]="lastName"
                    class="drawer-input"
                    name="lastName"
                    type="text"
                    placeholder="Barrera"
                    required
                />
            </div>

            <div class="flex flex-col gap-2">
                <p class="text-text-secondary">Email Address</p>
                <input
                    [(ngModel)]="emailAddress"
                    class="drawer-input"
                    name="emailAddress"
                    type="email"
                    placeholder="user@test.com"
                    required
                />
            </div>

            <div class="flex flex-col gap-2">
                <p class="text-text-secondary">Role</p>
                <app-dropdown
                    [list]="userFields().roles"
                    [initialSelection]="selectedRole()"
                    (dropdownChanged)="handleDropdownChanged($event)"
                />
            </div>
        </div>
    </div>

    <div class="self-start flex gap-2">
        <app-submit-button
            class="mt-auto w-30"
            [text]="'Create'"
            [loading]="this.loading()"
        />
        <button class="btn btn-cancel w-30" (click)="drawer.close()">
            Cancel
        </button>
    </div>
</form>
