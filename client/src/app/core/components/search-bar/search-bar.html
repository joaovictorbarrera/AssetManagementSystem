<div class="flex">
    <input
        [(ngModel)]="searchText"
        type="text"
        class="p-2 border-2 border-bg-elevated outline-none"
        placeholder="Search"

        class="p-2 border-2 border-bg-elevated rounded-none! flex justify-center items-center"

    </button>
</div>
