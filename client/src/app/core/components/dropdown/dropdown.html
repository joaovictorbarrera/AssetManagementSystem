<span class="flex flex-col" (click)="$event.stopPropagation()">
  @if (label) {
    <span class="text-sm p-1 text-text-muted">{{ label }}</span>
  }
  <select [(ngModel)]="currentValue" (ngModelChange)="onChange($event)" class="dropdown">
    @if (enableAll) {
      <option value="all">All</option>
    }
    @for (item of list; track item) {
      <option [value]="item">{{ item | titlecase }}</option>
    }
  </select>
</span>
