<app-page>
    <app-page-header>
        <h1 class="text-3xl text-center">My Assets</h1>
    </app-page-header>
    <div class="flex gap-5 justify-center p-5 items-end">
        <app-dropdown [name]="`Condition`" [list]="assetFields().conditions" (dropdownChanged)="handleConditionChange($event)" />

        <app-search-bar (search)="handleSearch($event)" />

        <app-dropdown [name]="`Category`" [list]="assetFields().categories" (dropdownChanged)="handleCategoryChange($event)" />
    </div>
    <app-assets-table [headers]="headers" [assets]="assets()" [loading]="loadingAssets()" />
    <app-table-pagination [colspan]="headers.length" [pagination]="assets().pagination" (paginationChanged)="handlePaginationChange($event)" />
</app-page>
