<app-page>
    <app-page-header>
        <div class="flex items-center w-full relative">
            <button class="btn btn-accent flex items-center gap-0.5">
                <ng-icon name="heroPlus" size="20" />
                <span class="btnpb-px">New Asset</span>
            </button>
            <h1 class="text-3xl absolute left-1/2 transform -translate-x-1/2">Inventory</h1>
        </div>
    </app-page-header>
    <div class="flex gap-5 justify-center p-5 items-end">
        <app-dropdown class="w-50" [enableAll]="true" [label]="`Status`" [list]="assetFields().statuses" (dropdownChanged)="handleStatusChange($event)" />

        <app-search-bar (search)="handleSearch($event)" />

        <app-dropdown class="w-50" [enableAll]="true" [label]="`Category`" [list]="assetFields().categories" (dropdownChanged)="handleCategoryChange($event)" />
        <app-dropdown class="w-50" [enableAll]="true" [label]="`Condition`" [list]="assetFields().conditions" (dropdownChanged)="handleConditionChange($event)" />

        <div class="flex gap-2 text-text-muted text-sm items-center mb-3">
            <input class="checkbox" type="checkbox" (change)="handleIncludeArchived($event)"/>
            <span>Include Archived</span>
        </div>
    </div>
    <app-inventory-table [assetFields]="assetFields()" [headers]="headers" [assets]="assets()" [loading]="loadingAssets()" />
    <app-table-pagination [name]="'Assets'" [colspan]="headers.length" [pagination]="assets().pagination" (paginationChanged)="handlePaginationChange($event)" />
</app-page>
